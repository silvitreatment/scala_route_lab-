rules = [
  # Встроенные правила Scalafix
  DisableSyntax,
  LeakingImplicitClassVal,
  NoValInForComprehension,
  OrganizeImports,
  RedundantSyntax,
  ProcedureSyntax,
  ExplicitResultTypes,
]

# ── DisableSyntax ──────────────────────────────────────────────
DisableSyntax {
  noVars          = true   # запрет var (предпочитаем val)
  noNulls         = true   # запрет null
  noReturns       = true   # запрет return
  noWhileLoops    = true   # запрет while (используем рекурсию / Stream)
  noAsInstanceOf  = true   # запрет небезопасного каста
  noIsInstanceOf  = true   # запрет проверки типа (используем pattern matching)
  noXml           = true   # запрет XML-литералов
  noDefaultArgs   = false  # default args разрешены
  noFinalVal      = false  # final val разрешены
  noSemicolons    = true   # запрет точек с запятой
  noValPatterns   = false
  noUniversalEquality = false
}

# ── OrganizeImports ────────────────────────────────────────────
OrganizeImports {
  groups = [
    "java.",
    "javax.",
    "scala.",
    "*",
    "routelab."
  ]
  removeUnused = true
  expandRelative = true
  coalesceToWildcardImportThreshold = 5
}

# ── ExplicitResultTypes ────────────────────────────────────────
ExplicitResultTypes {
  # Требуем явные типы только для публичных членов
  memberKind = [Def, Val]
  memberVisibility = [Public, Protected]
  skipSimpleDefinitions = ["Lit", "Term.New", "Term.Ref"]
}
