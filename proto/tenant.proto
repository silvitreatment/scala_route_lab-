syntax = "proto3";
package routelab.tenant;

// Контракт Tenant Service.
// Используется API Gateway для аутентификации входящих запросов по API ключу.
// Tenant — B2B клиент платформы (компания, которая использует RouteLab Lite).

service TenantService {
  rpc AuthenticateApiKey (AuthenticateApiKeyRequest) returns (AuthenticateApiKeyResponse);
}

// key_hash — SHA-256 хэш от сырого API ключа.
// Сырой ключ никогда не хранится и не передаётся по сети.
message AuthenticateApiKeyRequest {
  string key_hash = 1;
}

message AuthenticateApiKeyResponse {
  bool   valid     = 1;
  string tenant_id = 2;
  int32  rpm       = 3; // requests per minute лимит тенанта
}
